services:
  - type: web
    name: assetpark-mercadopublico
    runtime: node
    plan: free
    buildCommand: |
      cd engine && npm install --no-bin-links && node node_modules/typescript/bin/tsc
      cd ../api && npm install --no-bin-links && node node_modules/typescript/bin/tsc
      cd ../frontend && npm install --no-bin-links && node node_modules/typescript/bin/tsc && node node_modules/vite/bin/vite.js build
    startCommand: cd api && NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MP_TICKET
        value: 8BBCAB7E-0911-4E40-BD68-C56A0A33FF78
