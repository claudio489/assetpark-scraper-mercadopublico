services:
  - type: web
    name: assetpark-scraper
    runtime: node
    plan: free
    region: oregon
    buildCommand: echo "Using pre-compiled dist"
    startCommand: cd api && NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MP_TICKET
        value: 8BBCAB7E-0911-4E40-BD68-C56A0A33FF78
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    autoDeploy: true
