services:
  - type: web
    name: licitaciones-intelligence
    runtime: node
    plan: free
    buildCommand: |
      cd engine && npm install && npx tsc
      cd ../api && npm install && npx tsc
      cd ../frontend && npm install && npx vite build
    startCommand: cd api && NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MP_TICKET
        value: 8BBCAB7E-0911-4E40-BD68-C56A0A33FF78
