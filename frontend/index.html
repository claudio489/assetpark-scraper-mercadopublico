function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtN(n){return n>0?new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(n):'No disp.'}
function fmtD(d){if(!d)return'-';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d}
function gProf(id){return PROFILES.find(p=>p.id===id)||PROFILES[4]}
function calcScore(titulo,desc,keywords){const t=(titulo+' '+desc).toLowerCase();const mk=[];let ms=0;for(const k of keywords){if(t.includes(k.toLowerCase())){mk.push(k);ms+=3}}ms=Math.min(100,ms);return{ms,p:ms>=80?'alta':ms>=60?'media':'baja',mk}}

async function apiGet(p){const r=await fetch(API+p);return r.json()}
async function apiPost(p,b){const r=await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return r.json()}
async function apiPut(p,b){const r=await fetch(API+p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return r.json()}
async function apiDel(p){const r=await fetch(API+p,{method:'DELETE'});return r.json()}

async function runPipe(){
  if(st.load)return;
  st.load=true;st.ops=[];
  $('runBtn').disabled=true;
  $('spin').style.display='inline-block';
  $('runTxt').textContent='Cargando desde MercadoPublico...';
  $('err').classList.remove('show');

  const prof=gProf(st.pid);
  let data=null;

  try{
    // Llamada DIRECTA desde el navegador a MercadoPublico.cl
    const url=`${MP}/licitaciones.json?estado=activas&ticket=${TIC}`;
    const r=await fetch(url,{headers:{'Accept':'application/json'}});
    if(r.ok){
      data=await r.json();
      console.log('[Frontend] MercadoPublico OK, items:',data.Listado?.length||0);
    }else{
      console.log('[Frontend] MercadoPublico HTTP',r.status);
    }
  }catch(e){
    console.log('[Frontend] Error MercadoPublico:',e.message);
  }

  let raw=[];
  if(data&&data.Listado&&data.Listado.length>0){
    raw=data.Listado.map(lic=>({
      codigo:lic.CodigoExterno||'',nombre:lic.Nombre||'',organismo:(lic.Comprador?.NombreOrganismo||lic.Comprador?.NombreUnidad||'Organismo no especificado'),region:(lic.Comprador?.RegionUnidad||'No especificada').replace(/^Region\s*/i,''),monto:typeof lic.MontoEstimado==='number'?lic.MontoEstimado:0,fecha_publicacion:(lic.Fechas?.FechaPublicacion||'').split('T')[0],fecha_cierre:(lic.Fechas?.FechaCierre||lic.FechaCierre||'').split('T')[0],estado:lic.Estado||'Publicada',categoria:lic.Tipo||'General',url:`https://www.mercadopublico.cl/BuscarLicitacion/Home/FichaLicitacion/?codigo=${encodeURIComponent(lic.CodigoExterno||'')}`,descripcion:lic.Nombre||'',fuente:'MercadoPublico'
    }));
  }else{
    console.log('[Frontend] Usando demo data');
    raw=DEMO;
  }

  // Filtrar por keywords del perfil
  if(prof.keywords.length>0){
    const kw=prof.keywords.map(k=>k.toLowerCase());
    raw=raw.filter(op=>{
      const t=(op.nombre+' '+op.descripcion).toLowerCase();
      return kw.some(w=>t.includes(w));
    });
  }

  // Scoring
  st.ops=raw.slice(0,20).map(op=>{
    const sc=calcScore(op.nombre,op.descripcion,prof.keywords);
    return{
      id:op.codigo,title:op.nombre,description:op.descripcion,entity:op.organismo,region:op.region,
      amount:op.monto,date:op.fecha_publicacion,closingDate:op.fecha_cierre,status:op.estado,
      category:op.categoria,url:op.url,score:sc.ms||50,priority:sc.p,source:op.fuente,
      matchScore:sc.ms,matchedKeywords:sc.mk
    };
  });

  renderDash();renderTbl();

  st.load=false;
  $('runBtn').disabled=false;
  $('spin').style.display='none';
  $('runTxt').textContent='Ejecutar Pipeline';
}

function renderDash(){
  const n=st.ops.length;
  const a=st.ops.filter(o=>o.priority==='alta').length;
  const m=st.ops.filter(o=>o.priority==='media').length;
  const b=st.ops.filter(o=>o.priority==='baja').length;
  const avg=n>0?Math.round(st.ops.reduce((s,o)=>s+o.score,0)/n):0;
  $('dash').innerHTML=`<div class="card"><div class="cl">Total</div><div class="cv">${n}</div></div><div class="card"><div class="cl">Alta</div><div class="cv h">${a}</div></div><div class="card"><div class="cl">Media</div><div class="cv m">${m}</div></div><div class="card"><div class="cl">Baja</div><div class="cv b">${b}</div></div><div class="card"><div class="cl">Promedio</div><div class="cv sc">${avg}</div></div>`;
}

function renderTbl(){
  const c=$('tbl');
  if(st.ops.length===0){c.innerHTML='<div class="empty"><h3>Sin resultados</h3><p>No se encontraron licitaciones para este perfil.</p></div>';return}
  let h='<div style="overflow-x:auto"><table><thead><tr><th>Score</th><th>Título</th><th>Entidad</th><th>Región</th><th>Monto</th><th>Código</th><th>Prioridad</th></tr></thead><tbody>';
  for(const o of st.ops){
    h+=`<tr onclick="openMod('${esc(o.id)}')" ondblclick="window.open('${esc(o.url)}','_blank')">
    <td><span class="sb ${esc(o.priority)}">${o.score}</span></td>
    <td style="max-width:320px"><div style="font-weight:500">${esc(o.title)}</div><div style="font-size:0.75rem;color:var(--t3);margin-top:2px">${esc(o.category||'General')}</div></td>
    <td>${esc(o.entity||'-')}</td><td>${esc(o.region||'-')}</td>
    <td class="amt">${fmtN(o.amount)}</td><td><code>${esc(o.id)}</code></td>
    <td><span class="pri-b ${esc(o.priority)}">${esc(o.priority)}</span></td></tr>`;
  }
  h+='</tbody></table></div>';
  c.innerHTML=h;
}

  const curFpro=$('fpro').value;
  $('fpro').innerHTML=po;$('fpro').value=curFpro;

  if(f.length===0){t.innerHTML='<div class="empty" style="padding:40px"><h3>Portfolio vacío</h3><p>Seleccione una licitación y guárdela.</p></div>';$('fcnt').textContent='0';return}
  let h='<div style="overflow-x:auto"><table><thead><tr><th>Score</th><th>Título</th><th>Entidad</th><th>Perfil</th><th>Categoría</th><th>Monto</th><th>Guardada</th><th>Acciones</th></tr></thead><tbody>';
  for(const it of f){
    h+=`<tr>
    <td><div onclick="editSc('${esc(it.id)}',${it.score})" style="cursor:pointer"><span class="sb ${esc(it.priority)}">${it.score}</span></div></td>
    <td style="max-width:280px"><div style="font-weight:500">${esc(it.title)}</div><div style="font-size:0.75rem;color:var(--t3);margin-top:2px">${esc(it.opportunityId)}</div></td>
    <td>${esc(it.entity||'-')}</td>
    <td><select class="prs" onchange="chgProf('${esc(it.id)}',this.value)">${PROFILES.map(p=>`<option value="${esc(p.id)}" ${p.id===it.profileId?'selected':''}>${esc(p.name)}</option>`).join('')}</select></td>
    <td><select class="cas" onchange="chgCat('${esc(it.id)}',this.value)">${CATS.map(c=>`<option value="${esc(c)}" ${c===it.category?'selected':''}>${esc(c)}</option>`).join('')}</select></td>
    <td class="amt">${fmtN(it.amount)}</td>
    <td>${fmtD((it.savedAt||'').split('T')[0])}</td>
    <td><div class="acts"><a href="${esc(it.url)}" target="_blank" class="bi">↗</a><button class="bi d" onclick="delPort('${esc(it.id)}')">🗑</button></div></td>
    </tr>`;
  }
  h+='</tbody></table></div>';
  t.innerHTML=h;$('fcnt').textContent=f.length;
}

async function chgProf(id,pid){const p=PROFILES.find(x=>x.id===pid);await apiPut('/portfolio/'+id+'/profile',{profileId:pid,profileName:p?p.name:pid});loadPort()}
async function chgCat(id,cat){await apiPut('/portfolio/'+id+'/category',{category:cat});loadPort()}
async function delPort(id){if(!confirm('¿Eliminar?'))return;await apiDel('/portfolio/'+id);loadPort()}
function editSc(id,sc){const n=prompt('Score 0-100:',sc);if(n===null)return;const v=parseInt(n,10);if(isNaN(v)||v<0||v>100)return;apiPut('/portfolio/'+id+'/score',{score:v}).then(()=>loadPort())}

function changeProfile(id){st.pid=id;}

// Init
popProf();
loadPort();
</script>
</body>
</html>
